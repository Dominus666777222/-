name: Build and Release Android App

on:
  push:
    branches: [ "main", "master" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '21'
        cache: 'gradle'

    - name: Setup Environment Files
      run: |
        if [ -f .env.example ]; then
          cp .env.example .env
        else
          touch .env
        fi
        
        # Inject the Gemini API Key from GitHub Secrets if configured
        if [ -n "${{ secrets.GEMINI_API_KEY }}" ]; then
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" > .env
        fi

    - name: Setup Release Keystore
      env:
        RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
      run: |
        if [ -n "$RELEASE_KEYSTORE_BASE64" ]; then
          echo "Decoding release keystore..."
          echo "$RELEASE_KEYSTORE_BASE64" | base64 --decode > app/my-upload-key.jks
        else
          echo "No release keystore secret found, build will fall back to debug/unsigned release."
        fi

    - name: Download clean Gradle Wrapper
      run: |
        mkdir -p gradle/wrapper
        curl -L -o gradle/wrapper/gradle-wrapper.jar https://raw.githubusercontent.com/gradle/gradle/v9.3.1/gradle/wrapper/gradle-wrapper.jar

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Android App
      env:
        KEYSTORE_PATH: "my-upload-key.jks"
        STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      run: |
        if [ -f app/my-upload-key.jks ] && [ -n "${{ secrets.STORE_PASSWORD }}" ] && [ -n "${{ secrets.KEY_PASSWORD }}" ]; then
          echo "Building signed Release APK..."
          ./gradlew assembleRelease
        else
          echo "Building Debug APK..."
          ./gradlew assembleDebug
        fi

    - name: Locate and Prepare APK
      id: locate_apk
      run: |
        if [ -f app/build/outputs/apk/release/app-release.apk ]; then
          echo "Found release APK!"
          cp app/build/outputs/apk/release/app-release.apk GoydaCalc_1_5.apk
          echo "signed=true" >> $GITHUB_OUTPUT
        elif [ -f app/build/outputs/apk/debug/app-debug.apk ]; then
          echo "Found debug APK!"
          cp app/build/outputs/apk/debug/app-debug.apk GoydaCalc_1_5.apk
          echo "signed=false" >> $GITHUB_OUTPUT
        else
          echo "Error: No APK found!"
          exit 1
        fi

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: GoydaCalc_1_5
        path: GoydaCalc_1_5.apk

    - name: Create GitHub Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        files: GoydaCalc_1_5.apk
        name: Release ${{ github.ref_name }}
        tag_name: ${{ github.ref_name }}
        draft: false
        prerelease: false
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
